name: CI

on:
  push:
  pull_request:

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
          - name: Checkout repository
            uses: actions/checkout@v6

          - name: Checkout Node.js
            uses: actions/setup-node@v6
            with:
                node-version-file: .node-version
                registry-url: 'https://registry.npmjs.org'

          - name: Setup Bun
            uses: oven-sh/setup-bun@v2
            with:
                bun-version: latest

          - name: Install deps
            run: bun ci

          - name: Build
            run: npm run build

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
          - name: Checkout repository
            uses: actions/checkout@v6

          - name: Checkout Node.js
            uses: actions/setup-node@v6
            with:
                node-version-file: .node-version
                registry-url: 'https://registry.npmjs.org'

          - name: Setup Bun
            uses: oven-sh/setup-bun@v2
            with:
                bun-version: latest

          - name: Install deps
            run: bun ci

          - name: Lint
            run: npm run lint
